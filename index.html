<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乘务一分部 · 月度分队考核评分系统（云版）</title>
<style>
:root{--primary:#1a3a6b;--primary-light:#2a5298;--primary-dark:#0f2445;--accent:#c4161c;--accent-light:#e8383e;--gold:#d4a843;--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#5a6070;--border:#d8dce5;--success:#27ae60;--warning:#f39c12;--danger:#c0392b;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== 密码锁 ===== */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
.login-overlay.hidden{opacity:0;pointer-events:none}
.login-box{background:var(--card);border-radius:12px;padding:36px 32px;width:360px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center}
.login-box .icon{font-size:48px;margin-bottom:12px}
.login-box h2{font-size:18px;color:var(--primary);margin-bottom:4px}
.login-box p{font-size:12px;color:var(--text2);margin-bottom:20px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;text-align:center;outline:none;margin-bottom:12px;letter-spacing:2px}
.login-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,58,107,.1)}
.login-box .btn{width:100%;padding:10px;font-size:14px;margin-bottom:8px}
.login-error{color:var(--danger);font-size:12px;min-height:18px;margin-top:4px}
.change-pw-hint{margin-top:12px;font-size:11px;color:var(--text2)}
.change-pw-hint a{color:var(--primary);cursor:pointer;text-decoration:underline}

/* ===== 主界面 ===== */
.header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.15);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:44px;height:44px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-title h1{font-size:18px;font-weight:600;letter-spacing:.5px}
.header-title p{font-size:11px;opacity:.8;margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.header-badge{background:rgba(255,255,255,.15);padding:5px 12px;border-radius:16px;font-size:11px;backdrop-filter:blur(10px)}
.header-badge.cloud{background:rgba(39,174,96,.3)}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.sync-dot.online{background:#2ecc71}.sync-dot.offline{background:#e74c3c}.sync-dot.syncing{background:#f39c12;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.nav-tabs{background:var(--card);padding:0 24px;display:flex;border-bottom:2px solid var(--bg);box-shadow:0 1px 4px rgba(0,0,0,.04);position:sticky;top:76px;z-index:99}
.nav-tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--primary);background:rgba(26,58,107,.03)}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--accent);font-weight:600}
.main{padding:16px 24px 40px;max-width:1400px;margin:0 auto}
.page{display:none}.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.selector-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.selector-row label{font-size:12px;color:var(--text2);font-weight:500}
.selector-row select{padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;color:var(--text);outline:none}
.selector-row select:focus{border-color:var(--primary)}
.btn{padding:7px 16px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not(:disabled){background:var(--primary-light)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover:not(:disabled){background:var(--accent-light)}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:1px solid var(--primary)}.btn-outline:hover:not(:disabled){background:rgba(26,58,107,.05)}
.btn-danger{background:var(--danger);color:#fff}
.score-table{width:100%;border-collapse:collapse;font-size:12px}
.score-table th,.score-table td{padding:7px 8px;border:1px solid var(--border);text-align:center;vertical-align:middle}
.score-table th{background:var(--primary);color:#fff;font-weight:500;font-size:11px;white-space:nowrap}
.score-table tr:nth-child(even){background:#fafbfc}
.score-table tr:hover{background:#eef1f7}
.score-table .cat-row{background:#eef2f8!important;font-weight:600;color:var(--primary);font-size:12px}
.score-table .cat-row td{text-align:left;padding-left:14px}
.score-table .item-name{text-align:left;padding-left:20px;font-size:11px;max-width:220px}
.score-table .rule-col{font-size:10px;color:var(--text2);max-width:110px;line-height:1.4}
.score-table .total-row{background:#f0f3f9!important;font-weight:700;font-size:13px}
.score-table .total-row td{border-top:2px solid var(--primary)}
.score-cell{min-width:140px;padding:6px 6px!important}
.score-ctrl{display:flex;flex-direction:column;gap:4px;align-items:center}
.step-ctrl{display:flex;align-items:center;gap:3px}
.step-btn{width:24px;height:24px;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.step-btn:disabled{opacity:.4;cursor:not-allowed}
.step-btn-minus{background:#fde8e8;color:var(--danger)}.step-btn-minus:hover:not(:disabled){background:var(--danger);color:#fff}
.step-btn-plus{background:#e8f7ee;color:var(--success)}.step-btn-plus:hover:not(:disabled){background:var(--success);color:#fff}
.step-val{min-width:32px;text-align:center;font-weight:700;font-size:13px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;background:#fff}
.step-val.neg{color:var(--danger)}.step-val.pos{color:var(--success)}
.step-unit{font-size:9px;color:var(--text2);white-space:nowrap}
.toggle-ctrl{display:flex;gap:3px}
.toggle-btn{padding:3px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;transition:all .15s;background:#fff;color:var(--text2);font-weight:500}
.toggle-btn:disabled{opacity:.4;cursor:not-allowed}
.toggle-btn.active-yes{background:var(--success);color:#fff;border-color:var(--success)}
.toggle-btn.active-no{background:var(--danger);color:#fff;border-color:var(--danger)}
.note-input{width:100%;padding:2px 5px;border:1px solid var(--border);border-radius:3px;font-size:10px;outline:none;color:var(--text2)}
.note-input:focus{border-color:var(--primary)}
.score-display{font-size:11px;color:var(--text2);text-align:center}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700;color:#fff}
.rank-1{background:linear-gradient(135deg,#FFD700,#FFA500)}.rank-2{background:linear-gradient(135deg,#C0C0C0,#A0A0A0)}.rank-3{background:linear-gradient(135deg,#CD7F32,#B8690E)}.rank-4{background:#888}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card:nth-child(1)::before{background:var(--accent)}.stat-card:nth-child(2)::before{background:var(--primary)}.stat-card:nth-child(3)::before{background:var(--gold)}.stat-card:nth-child(4)::before{background:var(--success)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:26px;font-weight:700;color:var(--primary)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px}
.summary-table{width:100%;border-collapse:collapse;font-size:12px}
.summary-table th,.summary-table td{padding:8px 12px;border:1px solid var(--border);text-align:center}
.summary-table th{background:var(--primary);color:#fff;font-weight:500;font-size:11px}
.summary-table tr:nth-child(even){background:#fafbfc}
.summary-table .team-name{text-align:left;font-weight:600;padding-left:16px}
.month-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.month-card-header{padding:12px 16px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.month-card-header h3{font-size:13px;font-weight:600}
.month-card-body{padding:14px 16px}
.year-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.year-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;position:relative;overflow:hidden}
.year-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%}
.year-card.t1::before{background:var(--accent)}.year-card.t2::before{background:var(--primary)}.year-card.t3::before{background:var(--gold)}.year-card.t4::before{background:var(--success)}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state .icon{font-size:42px;margin-bottom:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--primary);color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.team-th-1{background:#8b0e14!important}.team-th-2{background:#15376b!important}.team-th-3{background:#9a7520!important}.team-th-4{background:#1a7a40!important}
.score-pos{color:var(--success);font-weight:600}.score-neg{color:var(--danger);font-weight:600}
.tab-badge{display:inline-block;background:var(--accent);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:4px;vertical-align:middle}
.score-input{width:60px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-size:12px;outline:none}
.score-input:focus{border-color:var(--primary);background:#f8f9ff}
.score-input.neg{color:var(--danger)}.score-input.pos{color:var(--success)}
.loading-spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.header{padding:12px 14px}.header-title h1{font-size:15px}.main{padding:12px 14px}.stats-row{grid-template-columns:repeat(2,1fr)}.year-grid{grid-template-columns:1fr}.nav-tabs{padding:0 10px;overflow-x:auto}.nav-tab{padding:10px 12px;font-size:12px}.login-box{padding:28px 20px}}
@media print{.login-overlay,.header,.nav-tabs,.selector-row,.btn,.sync-dot{display:none!important}.main{padding:0}.card{box-shadow:none;border:1px solid #ddd}}
</style>
</head>
<body>

<!-- ===== 密码锁 ===== -->
<div class="login-overlay" id="loginOverlay">
<div class="login-box">
<div class="icon">🔐</div>
<h2>乘务一分部考核系统</h2>
<p>云版 · 请输入访问密码</p>
<input type="password" id="loginPw" placeholder="请输入密码" autofocus>
<button class="btn btn-primary" id="loginBtn" onclick="doLogin()">进入系统</button>
<div class="login-error" id="loginError"></div>
</div>
</div>

<!-- ===== 主界面 ===== -->
<div class="header">
<div class="header-left">
<div class="header-logo">南</div>
<div class="header-title">
<h1>乘务一分部 · 月度分队考核评分系统</h1>
<p>中国南方航空吉林分公司客舱部 · 2026R5版 · 云版 · 起始分100+加减分</p>
</div>
</div>
<div class="header-right">
<span class="header-badge cloud" id="syncStatus"><span class="sync-dot online" id="syncDot"></span><span id="syncLabel">云同步</span></span>
<span class="header-badge" id="dataInfo">加载中...</span>
</div>
</div>
<div class="nav-tabs">
<div class="nav-tab active" data-page="scoring">📝 月度评分</div>
<div class="nav-tab" data-page="monthly">📊 月度详情</div>
<div class="nav-tab" data-page="cumulative">📈 累计追踪</div>
<div class="nav-tab" data-page="annual">🏆 年度汇总</div>
</div>
<div class="main">
<!-- SCORING PAGE -->
<div class="page active" id="page-scoring">
<div class="selector-row">
<label>考核年度</label><select id="sYear"></select>
<label>考核月份</label><select id="sMonth"><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select>
<button class="btn btn-primary" onclick="loadScoring()">加载评分表</button>
<button class="btn btn-accent" onclick="saveScores()">💾 保存</button>
<button class="btn btn-outline" onclick="exportMonth()">📤 导出</button>
<button class="btn btn-danger" onclick="clearMonth()">🗑️ 清空本月</button>
</div>
<div id="scoringArea"><div class="empty-state"><div class="icon">📋</div><p>选择考核年月后点击「加载评分表」</p></div></div>
</div>
<!-- MONTHLY DETAIL -->
<div class="page" id="page-monthly">
<div class="selector-row">
<label>查看年度</label><select id="dYear"></select>
<button class="btn btn-primary" onclick="loadDetail()">查看详情</button>
</div>
<div id="detailArea"><div class="empty-state"><div class="icon">📊</div><p>选择年度查看各月考核详情</p></div></div>
</div>
<!-- CUMULATIVE -->
<div class="page" id="page-cumulative">
<div class="selector-row">
<label>统计年度</label><select id="cYear"></select>
<button class="btn btn-primary" onclick="loadCumul()">查看累计</button>
<button class="btn btn-outline" onclick="exportCumul()">📤 导出</button>
</div>
<div id="cumulArea"><div class="empty-state"><div class="icon">📈</div><p>正在加载累计数据…</p></div></div>
</div>
<!-- ANNUAL -->
<div class="page" id="page-annual">
<div class="selector-row">
<label>汇总年度</label><select id="aYear"></select>
<button class="btn btn-primary" onclick="loadAnnual()">生成年度汇总</button>
<button class="btn btn-outline" onclick="exportAnnual()">📤 导出报告</button>
</div>
<div id="annualArea"><div class="empty-state"><div class="icon">🏆</div><p>生成分队年度考核排名汇总</p></div></div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== Supabase 配置 =====
const SB_URL = 'https://mohmfkkhlqsprvgdsgcm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vaG1ma2tobHFzcHJ2Z2RzZ2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMjkzMzYsImV4cCI6MjA5NDkwNTMzNn0.a9ts68375fBuxJe-Txbi275mhulK0KuHaqsb_Syy0Y4';
const PW_HASH = '6635ecb7d537df6a9e2edaf82aeabe89fdbe8741e653387f64ecb14b5312e912'; // SHA-256 of default password

// ===== 密码管理 =====
const AUTH_KEY = 'cabin_cloud_auth_v1';
const PW_STORAGE_KEY = 'cabin_cloud_pw_v1';

let authToken = null;

function getStoredAuth(){
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if(!raw) return null;
    const d = JSON.parse(raw);
    if(Date.now() - d.ts > 86400000) return null; // 24h过期
    return d.token;
  } catch { return null; }
}

function setStoredAuth(token){
  localStorage.setItem(AUTH_KEY, JSON.stringify({token, ts: Date.now()}));
}

function getStoredPwHash(){
  return localStorage.getItem(PW_STORAGE_KEY) || PW_HASH;
}

async function sha256(str){
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin(){
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if(!pw){ errEl.textContent = '请输入密码'; return; }
  
  btn.disabled = true;
  btn.textContent = '验证中...';
  
  const inputHash = await sha256(pw);
  const storedHash = getStoredPwHash();
  
  if(inputHash === storedHash){
    authToken = inputHash;
    setStoredAuth(inputHash);
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loginError').textContent = '';
    bootApp();
  } else {
    errEl.textContent = '密码错误，请重试';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginPw').focus();
  }
  btn.disabled = false;
  btn.textContent = '进入系统';
}

// 回车登录
document.addEventListener('keydown', function(e){
  if(!authToken && e.key==='Enter'){
    document.getElementById('loginPw').focus();
    doLogin();
  }
});

// ===== Supabase API =====
async function sbFetch(path, options = {}){
  const url = `${SB_URL}/rest/v1/${path}`;
  const headers = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json',
    ...options.headers
  };
  const res = await fetch(url, { ...options, headers });
  if(!res.ok){
    const txt = await res.text();
    throw new Error(`Supabase error ${res.status}: ${txt}`);
  }
  // 204 No Content
  if(res.status === 204) return null;
  return res.json();
}

// 拉取某月全部数据
async function fetchMonthRows(y, m){
  const ym = k(y, m);
  const rows = await sbFetch(`scoring?year_month=eq.${ym}&select=*&limit=500`);
  return rows || [];
}

// 拉取全年数据
async function fetchYearRows(y){
  const rows = await sbFetch(`scoring?year_month=like.${y}-*&select=*&limit=5000`);
  return rows || [];
}

// 批量 upsert 行
async function upsertRows(rows){
  if(!rows || rows.length === 0) return;
  const res = await sbFetch('scoring', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(rows)
  });
  return res;
}

// 删除某月全部数据
async function deleteMonthRows(y, m){
  const ym = k(y, m);
  await sbFetch(`scoring?year_month=eq.${ym}`, { method: 'DELETE' });
}

// ===== 数据层：内存缓存 =====
let _cache = {}; // { "2026-04": { "0_s08": {score,note}, ... } }
let _cacheLoaded = {}; // { "2026-04": true }

function k(y,m){ return `${y}-${String(m).padStart(2,'0')}`; }

async function ensureMonth(y,m){
  const key = k(y,m);
  if(_cacheLoaded[key]) return _cache[key];
  
  setSync('syncing');
  const rows = await fetchMonthRows(y,m);
  if(rows.length > 0){
    // 已有数据，加载
    const md = {};
    rows.forEach(r => { md[`${r.team_index}_${r.item_id}`] = {score: r.score, note: r.note || ''}; });
    // 确保所有 item 都有条目
    TEAMS.forEach((_,ti) => ALL_ITEMS.forEach(it => {
      const pk = `${ti}_${it.id}`;
      if(!md[pk]) md[pk] = {score: 0, note: ''};
    }));
    _cache[key] = md;
  } else {
    // 没有数据：检查有无预置数据
    const md = {};
    TEAMS.forEach((_,ti) => ALL_ITEMS.forEach(it => {
      const pk = `${ti}_${it.id}`;
      if(PRESET_DATA[key] && PRESET_DATA[key][pk]){
        md[pk] = {score: PRESET_DATA[key][pk].score, note: PRESET_DATA[key][pk].note};
      } else {
        md[pk] = {score: 0, note: ''};
      }
    }));
    _cache[key] = md;
    
    // 如有预置数据，写入 Supabase
    if(PRESET_DATA[key]){
      const toUpsert = [];
      TEAMS.forEach((_,ti) => ALL_ITEMS.forEach(it => {
        const pk = `${ti}_${it.id}`;
        const p = PRESET_DATA[key][pk];
        if(p){
          toUpsert.push({ team_index: ti, year_month: key, item_id: it.id, score: p.score, note: p.note || '' });
        }
      }));
      if(toUpsert.length > 0){
        await upsertRows(toUpsert);
      }
    }
  }
  _cacheLoaded[key] = true;
  setSync('online');
  return _cache[key];
}

// 立即同步单个单元格到 Supabase
async function syncCell(ti, itemId, y, m, score, note){
  const ym = k(y,m);
  // 更新内存缓存
  if(!_cache[ym]) _cache[ym] = {};
  _cache[ym][`${ti}_${itemId}`] = {score, note};
  
  // 写入 Supabase
  try {
    setSync('syncing');
    await upsertRows([{ team_index: ti, year_month: ym, item_id: itemId, score, note }]);
    setSync('online');
  } catch(e){
    setSync('offline');
    console.error('同步失败:', e);
    showToast('⚠️ 云端同步失败，数据已暂存本地');
    // 暂存到 localStorage 作为备份
    const backup = JSON.parse(localStorage.getItem('cabin_backup')||'{}');
    backup[`${ym}_${ti}_${itemId}`] = {score, note, ts: Date.now()};
    localStorage.setItem('cabin_backup', JSON.stringify(backup));
  }
}

// 批量同步整月数据
async function syncMonth(y, m){
  const key = k(y,m);
  const md = _cache[key];
  if(!md) return;
  
  const rows = [];
  TEAMS.forEach((_,ti) => ALL_ITEMS.forEach(it => {
    const v = md[`${ti}_${it.id}`];
    if(v){
      rows.push({ team_index: ti, year_month: key, item_id: it.id, score: v.score, note: v.note || '' });
    }
  }));
  
  try {
    setSync('syncing');
    await upsertRows(rows);
    setSync('online');
    return true;
  } catch(e){
    setSync('offline');
    console.error('批量同步失败:', e);
    return false;
  }
}

function setSync(state){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  if(state==='online') label.textContent = '云同步';
  else if(state==='syncing') label.textContent = '同步中...';
  else label.textContent = '离线';
}

function updateInfo(){
  const loaded = Object.keys(_cacheLoaded).length;
  document.getElementById('dataInfo').textContent = loaded ? `☁️ 已加载 ${loaded} 个月` : '暂无数据';
}

// ===== 控件渲染 =====
function renderCtrl(ti, it, currentScore, currentNote){
  const c = it.ctrl;
  const key = `${ti}_${it.id}`;
  const sc = typeof currentScore==='number' ? currentScore : 0;
  const nt = (currentNote||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

  const noteHtml = `<input type="text" class="note-input" id="nt_${key}" value="${nt}" placeholder="备注">`;

  if(c.type === 'step'){
    const isDeduct = c.delta < 0;
    const isBonus  = c.delta > 0;
    const absDelta  = Math.abs(c.delta);
    const scCls = sc>0?'pos':(sc<0?'neg':'');
    const maxHint = c.max ? `<span style="font-size:9px;color:var(--text2)">上限${c.max>0?'+':''}${c.max}</span>` : '';
    let btnHtml = `<div class="step-ctrl" style="justify-content:center;gap:6px">`;
    if(isDeduct){
      btnHtml += `<button class="step-btn step-btn-minus" id="btn_${key}" onclick="stepScore(${ti},'${it.id}',${-absDelta},${c.max||9999})" title="扣${absDelta}分 / 人次" style="width:32px;height:28px;font-size:15px">−</button>`;
      btnHtml += `<span class="step-val ${scCls}" id="sv_${key}" style="min-width:40px">${sc>0?'+':''}${sc}</span>`;
      btnHtml += `<span class="step-unit">分</span>`;
    } else {
      btnHtml += `<span class="step-val ${scCls}" id="sv_${key}" style="min-width:40px">${sc>0?'+':''}${sc}</span>`;
      btnHtml += `<span class="step-unit">分</span>`;
      btnHtml += `<button class="step-btn step-btn-plus" id="btn_${key}" onclick="stepScore(${ti},'${it.id}',${absDelta},${c.max||9999})" title="加${absDelta}分 / 人次" style="width:32px;height:28px;font-size:15px">+</button>`;
    }
    btnHtml += `</div>`;
    return `<div class="score-ctrl">
      ${btnHtml}
      <div style="font-size:9px;color:var(--text2);margin-top:2px">${isDeduct?'每人次 −'+absDelta:'每人次 +'+c.delta} / ${c.unit} ${maxHint}</div>
      ${noteHtml}
    </div>`;
  } else if(c.type === 'toggle'){
    const triggered = sc !== 0;
    const labelYes = c.score>0 ? `✓ 已获得(${c.score>0?'+':''}${c.score})` : `✗ 已触发(${c.score})`;
    const labelNo = '— 未触发';
    return `<div class="score-ctrl">
      <div class="toggle-ctrl">
        <button class="toggle-btn ${triggered?(c.score>0?'active-yes':'active-no'):''}" id="tb_yes_${key}" onclick="toggleScore(${ti},'${it.id}',${c.score})">${labelYes}</button>
        <button class="toggle-btn ${!triggered?'active-yes':''}" id="tb_no_${key}" onclick="toggleScore(${ti},'${it.id}',0)">${labelNo}</button>
      </div>
      ${noteHtml}
    </div>`;
  } else {
    const scCls = sc>0?'pos':(sc<0?'neg':'');
    return `<div class="score-ctrl">
      <div class="step-ctrl">
        <input type="number" step="0.1" class="score-input ${scCls}" id="sc_${key}" value="${sc}" onchange="onInputScore(${ti},'${it.id}')" onfocus="this.select()">
        <span class="step-unit">分</span>
      </div>
      ${noteHtml}
    </div>`;
  }
}

// ===== 步进操作 =====
async function stepScore(ti, id, delta, maxAbs){
  const key = `${ti}_${id}`;
  const y=+document.getElementById('sYear').value;
  const m=+document.getElementById('sMonth').value;
  const ym = k(y,m);
  if(!_cache[ym]) return;
  
  const btn = document.getElementById(`btn_${key}`);
  if(btn) btn.disabled = true;
  
  let cur = _cache[ym][key] ? _cache[ym][key].score : 0;
  let newVal = parseFloat((cur + delta).toFixed(2));
  if(maxAbs && maxAbs<9999 && delta>0 && newVal > maxAbs) newVal = maxAbs;

  const el = document.getElementById(`sv_${key}`);
  if(el){
    const valF = parseFloat(newVal.toFixed(1));
    el.textContent = (valF>0?'+':'') + valF;
    el.className = 'step-val '+(valF>0?'pos':(valF<0?'neg':''));
  }
  
  const note = document.getElementById(`nt_${key}`)?.value||'';
  await syncCell(ti, id, y, m, newVal, note);
  refreshTotals(ti, _cache[ym]);
  
  if(btn) btn.disabled = false;
}

// ===== 开关操作 =====
async function toggleScore(ti, id, scoreVal){
  const key = `${ti}_${id}`;
  const y=+document.getElementById('sYear').value;
  const m=+document.getElementById('sMonth').value;
  const ym = k(y,m);
  if(!_cache[ym]) return;
  
  const yesBtn = document.getElementById(`tb_yes_${key}`);
  const noBtn = document.getElementById(`tb_no_${key}`);
  if(yesBtn) yesBtn.disabled = true;
  if(noBtn) noBtn.disabled = true;

  const note = document.getElementById(`nt_${key}`)?.value||'';
  await syncCell(ti, id, y, m, scoreVal, note);

  if(yesBtn && noBtn){
    if(scoreVal !== 0){
      yesBtn.className = 'toggle-btn '+(scoreVal>0?'active-yes':'active-no');
      noBtn.className = 'toggle-btn';
    } else {
      yesBtn.className = 'toggle-btn';
      noBtn.className = 'toggle-btn active-yes';
    }
  }
  refreshTotals(ti, _cache[ym]);
  
  if(yesBtn) yesBtn.disabled = false;
  if(noBtn) noBtn.disabled = false;
}

// ===== 直接输入分值 =====
async function onInputScore(ti, id){
  const key = `${ti}_${id}`;
  const inp = document.getElementById(`sc_${key}`);
  if(!inp) return;
  const v = parseFloat(inp.value)||0;
  inp.className = 'score-input '+(v>0?'pos':(v<0?'neg':''));
  const y=+document.getElementById('sYear').value;
  const m=+document.getElementById('sMonth').value;
  const ym = k(y,m);
  if(!_cache[ym]) return;
  
  const note = document.getElementById(`nt_${key}`)?.value||'';
  await syncCell(ti, id, y, m, v, note);
  refreshTotals(ti, _cache[ym]);
}

// ===== 刷新合计行 =====
function refreshTotals(ti, md){
  const total = calcTeamTotal(ti, md);
  const totalF = parseFloat(total.toFixed(1));
  const totEl = document.getElementById(`tot_${ti}`);
  if(totEl){
    totEl.textContent = totalF;
    totEl.style.color = totalF>=0?'var(--success)':'var(--danger)';
  }
  const raw = ALL_ITEMS.reduce((s,it)=>{const v=md[`${ti}_${it.id}`]; return s+(v?v.score:0);},0);
  const rawF = parseFloat(raw.toFixed(1));
  const adjEl = document.getElementById(`adj_${ti}`);
  if(adjEl){
    adjEl.textContent = (rawF>=0?'+':'')+rawF;
    adjEl.style.color = rawF>=0?'var(--success)':'var(--danger)';
  }
}

    h+=`</tr></thead><tbody>`;

    CATS.forEach(cat=>{
      h+=`<tr class="cat-row"><td colspan="${3+TEAMS.length}">${cat.name}</td></tr>`;

        h+=`<tr><td style="font-size:11px;color:var(--text2)">${it.num}</td><td class="item-name">${it.name}</td><td class="rule-col">${it.rule}</td>`;
        TEAMS.forEach((_,ti)=>{
          const key=`${ti}_${it.id}`;
          const v=md[key]||{score:0,note:''};
          h+=`<td class="score-cell">${renderCtrl(ti,it,v.score,v.note)}</td>`;
        });
        h+=`</tr>`;
      });
    });

    h+=`<tr class="total-row" style="background:#f8f9fc"><td colspan="3" style="text-align:right;padding-right:12px">起始分</td>`;
    TEAMS.forEach(()=>{h+=`<td style="font-size:14px;font-weight:600;color:var(--primary)">${BASE_SCORE}</td>`;});
    h+=`</tr>`;
    h+=`<tr class="total-row" style="background:#f8f9fc"><td colspan="3" style="text-align:right;padding-right:12px">加减分合计</td>`;
    TEAMS.forEach((_,ti)=>{
      const raw=ALL_ITEMS.reduce((s,it)=>{const v=md[`${ti}_${it.id}`]; return s+(v?v.score:0);},0);
      const rawF=parseFloat(raw.toFixed(1));
      h+=`<td><span id="adj_${ti}" style="font-size:14px;font-weight:600;color:${rawF>=0?'var(--success)':'var(--danger)'}">${rawF>=0?'+':''}${rawF}</span></td>`;
    });
    h+=`</tr>`;
    h+=`<tr class="total-row"><td colspan="3" style="text-align:right;padding-right:12px">最终得分</td>`;
    TEAMS.forEach((_,ti)=>{
      const total=calcTeamTotal(ti,md);
      const totalF=parseFloat(total.toFixed(1));
      h+=`<td><span id="tot_${ti}" style="font-size:16px;font-weight:700;color:${totalF>=0?'var(--success)':'var(--danger)'}">${totalF}</span></td>`;
    });
    h+=`</tr><tr class="total-row"><td colspan="3" style="text-align:right;padding-right:12px">排 名</td>`;
    const ranks=calcRanks(md);
    TEAMS.forEach((_,ti)=>{h+=`<td><span class="rank-badge rank-${ranks[ti]}">${ranks[ti]}</span></td>`;});

    document.getElementById('scoringArea').innerHTML=h;

  }
}

function calcTeamTotal(ti,md){
  const raw=ALL_ITEMS.reduce((s,it)=>{
    const v=md[`${ti}_${it.id}`]; return s+(v?v.score:0);
  },0);
  return BASE_SCORE+raw;
}

function calcRanks(md){
  const arr=TEAMS.map((_,ti)=>({ti,t:calcTeamTotal(ti,md)}));
  arr.sort((a,b)=>b.t-a.t);
  const r=new Array(4); let rank=1;
  arr.forEach((s,i)=>{if(i>0&&s.t<arr[i-1].t)rank=i+1;r[s.ti]=rank;});
  return r;
}

async function saveScores(){
  const y=+document.getElementById('sYear').value;
  const m=+document.getElementById('sMonth').value;
  const ym = k(y,m);
  if(!_cache[ym]){ showToast('⚠️ 请先加载评分表'); return; }

  // 从DOM同步最新值到cache
  ALL_ITEMS.forEach(it => {
    TEAMS.forEach((_,ti)=>{
      const itemKey=`${ti}_${it.id}`;
      const c = it.ctrl;
      let sc = 0;
      if(c.type==='step'){
        const sv = document.getElementById(`sv_${itemKey}`);
        sc = sv ? parseFloat(sv.textContent.replace('+',''))||0 : 0;
      } else if(c.type==='toggle'){
        sc = _cache[ym][itemKey] ? _cache[ym][itemKey].score : 0;
      } else {
        const scEl = document.getElementById(`sc_${itemKey}`);
        sc = scEl ? parseFloat(scEl.value)||0 : 0;
      }
      const ntEl = document.getElementById(`nt_${itemKey}`);
      _cache[ym][itemKey] = {score:sc, note:ntEl?ntEl.value:''};
    });
  });

  const ok = await syncMonth(y,m);
  if(ok){
    showToast(`✅ ${y}年${m}月评分已同步至云端`);
  } else {
    showToast(`⚠️ 云端同步失败，数据暂存本地缓存`);
  }
}

async function clearMonth(){
  const y=+document.getElementById('sYear').value;
  const m=+document.getElementById('sMonth').value;
  if(!confirm(`确定清空${y}年${m}月所有评分数据？此操作不可撤销！`)) return;
  
  try {
    setSync('syncing');
    await deleteMonthRows(y,m);
    _cache[k(y,m)] = {};
    _cacheLoaded[k(y,m)] = false;
    TEAMS.forEach((_,ti)=>ALL_ITEMS.forEach(it=>{
      _cache[k(y,m)][`${ti}_${it.id}`] = {score:0,note:''};
    }));
    setSync('online');
    loadScoring();
    showToast(`🗑️ ${y}年${m}月数据已清空（云端同步）`);
  } catch(e){
    setSync('offline');
    showToast('⚠️ 清空失败：' + e.message);
  }
}

// ===== MONTHLY DETAIL =====
async function loadDetail(){
  const y=+document.getElementById('dYear').value;
  // 预加载全年数据
  for(let m=1;m<=12;m++) await ensureMonth(y,m).catch(()=>{});

  let h=`<div class="stats-row">`;
  let latestM=0, latestData=null;
  for(let m=12;m>=1;m--){ if(_cache[k(y,m)]){ latestM=m; latestData=_cache[k(y,m)]; break; } }
  if(latestData){
    const ts=TEAMS.map((t,ti)=>({t,s:calcTeamTotal(ti,latestData)}));
    ts.sort((a,b)=>b.s-a.s);
    ts.forEach(item=>{
      h+=`<div class="stat-card"><div class="stat-label">${item.t}</div><div class="stat-value">${item.s}</div><div class="stat-sub">${y}年${latestM}月</div></div>`;
    });
  } else {
    h+=`<div class="stat-card" style="grid-column:span 4"><div class="stat-label">${y}年暂无数据</div></div>`;
  }
  h+=`</div>`;

  for(let m=12;m>=1;m--){
    const key=k(y,m);
    const md=_cache[key];
    const hasData=!!md;
    const histTotal=HIST_TOTALS[key];

    h+=`<div class="month-card">`;
    h+=`<div class="month-card-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">`;
    h+=`<h3>${m}月 ${hasData?'':(histTotal?'<span style="opacity:.7;font-weight:400;font-size:11px">（仅有汇总数据）</span>':'<span style="opacity:.5;font-weight:400;font-size:11px">（未录入）</span>')}</h3>`;
    h+=`<span>▼</span></div>`;
    h+=`<div class="month-card-body">`;

    if(hasData){
      const teamData=TEAMS.map((t,ti)=>{
        const catScores=CATS.map(cat=>{
          const catTotal=cat.items.reduce((s,it)=>{const v=md[`${ti}_${it.id}`];return s+(v?v.score:0);},0);
          return {name:cat.name,total:catTotal};
        });
        const total=catScores.reduce((s,c)=>s+c.total,0);
        return {team:t,catScores,total};
      });

      h+=`<table class="summary-table"><thead><tr><th>分队</th>`;
      CATS.forEach(c=>{h+=`<th>${c.name}</th>`;});
      h+=`<th>加减分合计</th><th>最终得分</th></tr></thead><tbody>`;

      teamData.forEach(td=>{
        h+=`<tr><td class="team-name">${td.team}</td>`;
        td.catScores.forEach(cs=>{
          const color=cs.total>=0?'var(--success)':'var(--danger)';
          h+=`<td style="color:${color};font-weight:600">${cs.total>0?'+':''}${cs.total}</td>`;
        });
        const finalScore=parseFloat((BASE_SCORE+td.total).toFixed(1));
        const rawAdj=parseFloat(td.total.toFixed(1));
        h+=`<td style="font-weight:700;color:${td.total>=0?'var(--success)':'var(--danger)'}">${rawAdj>0?'+':''}${rawAdj}</td>`;
        h+=`<td style="font-weight:700;font-size:14px;color:var(--primary)">${finalScore}</td></tr>`;
      });
      h+=`</tbody></table>`;
    } else if(histTotal){
      h+=`<p style="font-size:12px;color:var(--text2)">原Excel汇总：`;
      TEAMS.forEach((t,ti)=>{h+=`${t} <strong>${histTotal[ti]}</strong>分　`;});
      h+=`</p>`;
    } else {
      h+=`<p style="font-size:12px;color:var(--text2)">暂无数据</p>`;
    }
    h+=`</div></div>`;
  }

  document.getElementById('detailArea').innerHTML=h;
  updateInfo();
}

// ===== CUMULATIVE =====
async function loadCumul(){
  const y=+document.getElementById('cYear').value;
  // 预加载全年数据
  for(let m=1;m<=12;m++) await ensureMonth(y,m).catch(()=>{});

  const cumData=TEAMS.map((t,ti)=>{
    const monthly=[]; let cum=0;
    for(let m=1;m<=12;m++){
      const key=k(y,m);
      const md=_cache[key];
      let ms=0;
      if(md) ms=calcTeamTotal(ti,md);
      else if(HIST_TOTALS[key]) ms=HIST_TOTALS[key][ti];
      cum+=ms;
      monthly.push({m,s:ms,cum});
    }
    return {team:t,monthly,final:cum};
  });

  const ranked=[...cumData].sort((a,b)=>b.final-a.final);
  const rankMap={};let rank=1;
  ranked.forEach((s,i)=>{if(i>0&&s.final<ranked[i-1].final)rank=i+1;rankMap[s.team]=rank;});

  let h=`<div class="card"><div class="card-title">📈 ${y}年 分队累计得分追踪</div>`;
  h+=`<div style="overflow-x:auto"><table class="summary-table"><thead><tr><th>月份</th>`;
  TEAMS.forEach((t,ti)=>{h+=`<th class="${TEAM_TH[ti]}">${t}<br><span style="font-size:9px;font-weight:400;opacity:.85">当月得分 / 累计</span></th>`;});
  h+=`</tr></thead><tbody>`;

  cumData[0].monthly.forEach((_,mi)=>{
    const key=k(y,mi+1);
    const hasData=!!_cache[key]||!!HIST_TOTALS[key];
    h+=`<tr><td style="font-weight:600">${mi+1}月${hasData?'':'<span style="color:var(--text2);font-size:10px"> —</span>'}</td>`;
    cumData.forEach(td=>{
      const ms=parseFloat(td.monthly[mi].s.toFixed(1));
      const cumF=parseFloat(td.monthly[mi].cum.toFixed(1));
      const msColor=ms>0?'var(--success)':(ms<0?'var(--danger)':'var(--text2)');
      h+=`<td style="padding:4px 8px">`;
      if(ms!==0){
        h+=`<div style="font-weight:600;color:${msColor}">${ms>0?'+':''}${ms}</div>`;
      } else {
        h+=`<div style="color:var(--text2)">—</div>`;
      }
      h+=`<div style="font-size:10px;color:var(--primary);font-weight:500">累计 ${cumF>0?'+':''}${cumF}</div>`;
      h+=`</td>`;
    });
    h+=`</tr>`;
  });

  h+=`<tr style="background:#f0f3f9;font-weight:700"><td>年度累计总分</td>`;
  cumData.forEach(td=>{const f=parseFloat(td.final.toFixed(1));h+=`<td style="font-size:15px;color:var(--primary)">${f>0?'+':''}${f}</td>`;});
  h+=`</tr><tr style="background:#f0f3f9;font-weight:700"><td>排名</td>`;
  TEAMS.forEach((t,ti)=>{h+=`<td><span class="rank-badge rank-${rankMap[t]}">${rankMap[t]}</span></td>`;});
  h+=`</tr></tbody></table></div></div>`;

  h+=`<div class="card"><div class="card-title">📊 月度趋势（逐月得分）</div>`;
  const colors=['#c4161c','#1a3a6b','#d4a843','#27ae60'];
  cumData.forEach((td,ti)=>{
    const f=parseFloat(td.final.toFixed(1));
    h+=`<div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:4px;color:${colors[ti]}">${td.team}（${y}年累计 ${f>0?'+':''}${f} 分 · 排名第 ${rankMap[td.team]} ）</div>`;
    h+=`<div style="display:flex;gap:3px">`;
    td.monthly.forEach((ms,mi)=>{
      const maxBar=100;
      const s=parseFloat(ms.s.toFixed(1));
      const barH=Math.min(Math.abs(s)*1.2,maxBar);
      const op=s!==0?1:.15;
      const bg=s>=0?colors[ti]:'var(--danger)';
      h+=`<div style="flex:1;text-align:center"><div style="height:${maxBar}px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">`;
      h+=`<div style="width:100%;max-width:32px;height:${Math.max(barH,2)}px;background:${bg};opacity:${op};border-radius:3px 3px 0 0" title="${mi+1}月: ${s>0?'+':''}${s}分"></div>`;
      h+=`</div><div style="font-size:9px;color:var(--text2);margin-top:2px">${mi+1}月</div><div style="font-size:9px;font-weight:600;color:${s>0?colors[ti]:(s<0?'var(--danger)':'var(--text2)')}">${s!==0?(s>0?'+':'')+s:'—'}</div></div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;

  document.getElementById('cumulArea').innerHTML=h;
  updateInfo();
}

// ===== ANNUAL SUMMARY =====
async function loadAnnual(){
  const y=+document.getElementById('aYear').value;
  for(let m=1;m<=12;m++) await ensureMonth(y,m).catch(()=>{});

  const annData=TEAMS.map((t,ti)=>{
    let total=0,months=0;const ms=[];
    for(let m=1;m<=12;m++){
      const key=k(y,m);
      const md=_cache[key];
      let s=0;
      if(md){s=calcTeamTotal(ti,md);months++;}
      else if(HIST_TOTALS[key]){s=HIST_TOTALS[key][ti];months++;}
      ms.push(s);total+=s;
    }
    return {team:t,total,months,avg:months>0?(total/months).toFixed(1):0,ms};
  });

  const sorted=[...annData].sort((a,b)=>b.total-a.total);
  const rankMap={};let rank=1;
  sorted.forEach((s,i)=>{if(i>0&&s.total<sorted[i-1].total)rank=i+1;rankMap[s.team]=rank;});

  let h=`<div class="card" style="text-align:center;padding:24px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;border-radius:10px">`;
  h+=`<div style="font-size:22px;font-weight:700;margin-bottom:4px">🏆 ${y}年度 分队考核排名</div>`;
  h+=`<div style="font-size:13px;opacity:.8">南航吉林分公司客舱部 · 乘务一分部 · 云版</div></div>`;

  h+=`<div class="year-grid">`;
  sorted.forEach(td=>{
    const ti=TEAMS.indexOf(td.team);
    const colors=['#c4161c','#1a3a6b','#d4a843','#27ae60'];
    h+=`<div class="year-card ${TEAM_YC[ti]}"><div style="display:flex;justify-content:space-between;align-items:center">`;
    h+=`<h3 style="color:${colors[ti]}">${td.team}</h3><span class="rank-badge rank-${rankMap[td.team]}" style="width:34px;height:34px;font-size:15px">${rankMap[td.team]}</span></div>`;
    h+=`<div style="font-size:28px;font-weight:700;color:${colors[ti]};margin:6px 0">${(()=>{const f=parseFloat(td.total.toFixed(1));return (f>0?'+':'')+f;})()}<span style="font-size:13px;font-weight:400;color:var(--text2)"> 分</span></div>`;
    h+=`<div style="font-size:12px;color:var(--text2)">已录入 ${td.months} 个月 · 月均 ${td.avg} 分</div>`;
    h+=`<div style="display:flex;gap:3px;margin-top:10px">`;
    td.ms.forEach((s,mi)=>{
      const barH=Math.min(Math.abs(s)*1,60);
      const op=s!==0?1:.15;
      const bg=s>=0?colors[ti]:'var(--danger)';
      h+=`<div style="flex:1;height:${Math.max(barH,4)}px;background:${bg};opacity:${op};border-radius:2px 2px 0 0" title="${mi+1}月: ${s}分"></div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="card"><div class="card-title">📊 年度得分明细</div>`;
  h+=`<div style="overflow-x:auto"><table class="summary-table"><thead><tr><th>月份</th>`;
  TEAMS.forEach((t,ti)=>{h+=`<th class="${TEAM_TH[ti]}">${t}</th>`;});
  h+=`<th>当月最优</th></tr></thead><tbody>`;

  for(let m=1;m<=12;m++){
    h+=`<tr><td style="font-weight:600">${m}月</td>`;
    let bestT='',bestS=-Infinity;
    annData.forEach(td=>{
      const s=td.ms[m-1];
      if(s>bestS){bestS=s;bestT=td.team;}
      h+=`<td style="${s!==0?'font-weight:600':''};color:${s>0?'var(--success)':(s<0?'var(--danger)':'inherit')}">${s!==0?(s>0?'+':'')+s:'-'}</td>`;
    });
    h+=`<td style="color:var(--accent);font-weight:600">${bestS>-Infinity&&bestS!==0?bestT:'-'}</td></tr>`;
  }

  h+=`<tr style="background:#f0f3f9;font-weight:700"><td>年度累计</td>`;
  annData.forEach(td=>{h+=`<td style="font-size:15px;color:var(--primary)">${(()=>{const f=parseFloat(td.total.toFixed(1));return (f>0?'+':'')+f;})()}</td>`;});
  h+=`<td>-</td></tr>`;
  h+=`<tr style="background:#f0f3f9;font-weight:700"><td>月均得分</td>`;
  annData.forEach(td=>{h+=`<td style="font-weight:600">${td.avg}</td>`;});
  h+=`<td>-</td></tr>`;
  h+=`<tr style="background:#f0f3f9;font-weight:700"><td>年度排名</td>`;
  TEAMS.forEach(t=>{h+=`<td><span class="rank-badge rank-${rankMap[t]}">${rankMap[t]}</span></td>`;});
  h+=`<td>-</td></tr></tbody></table></div></div>`;

  h+=`<div class="card"><div class="card-title">🏅 月度冠军统计</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">`;
  const colors=['#c4161c','#1a3a6b','#d4a843','#27ae60'];
  TEAMS.forEach((t,ti)=>{
    let wins=0;
    for(let m=0;m<12;m++){
      const s=annData[ti].ms[m];
      if(s>0 && s===Math.max(...annData.map(td=>td.ms[m]))) wins++;
    }
    h+=`<div style="text-align:center;padding:14px;background:#fafbfc;border-radius:8px">`;
    h+=`<div style="font-weight:600;color:${colors[ti]};margin-bottom:4px">${t}</div>`;
    h+=`<div style="font-size:28px;font-weight:700;color:var(--gold)">${wins}</div>`;
    h+=`<div style="font-size:11px;color:var(--text2)">次月度冠军</div></div>`;
  });
  h+=`</div></div>`;

  document.getElementById('annualArea').innerHTML=h;
  updateInfo();
}

// ===== EXPORT =====
function exportMonth(){
  const y=+document.getElementById('sYear').value;
  const m=+document.getElementById('sMonth').value;
  const key=k(y,m);
  const md=_cache[key];
  if(!md){showToast('⚠️ 当月无数据');return;}
  let csv='\uFEFF';
  csv+=`${y}年${m}月 乘务一分部分队考核评分表（2026R5版·起始分${BASE_SCORE}·云版）\n\n`;
  csv+=`条款,评分规则,${TEAMS.join(',')}\n`;
  CATS.forEach(cat=>{
    csv+=`${cat.name},,\n`;
    cat.items.forEach(it=>{
      csv+=`${it.num} ${it.name},${it.rule}`;
      TEAMS.forEach((_,ti)=>{
        const v=md[`${ti}_${it.id}`]||{score:0};
        csv+=`,${v.score}`;
      });
      csv+=`\n`;
    });
  });
  csv+=`\n起始分,,`;
  TEAMS.forEach(()=>{csv+=`,${BASE_SCORE}`;});
  csv+=`\n加减分合计,,`;
  TEAMS.forEach((_,ti)=>{const raw=ALL_ITEMS.reduce((s,it)=>{const v=md[`${ti}_${it.id}`];return s+(v?v.score:0);},0);csv+=`,${raw}`;});
  csv+=`\n最终得分,,`;
  TEAMS.forEach((_,ti)=>{csv+=`,${calcTeamTotal(ti,md)}`;});
  downloadCSV(csv,`${y}年${m}月分队考核评分表.csv`);
  showToast('📤 已导出');
}

function exportCumul(){
  const y=+document.getElementById('cYear').value;
  let csv='\uFEFF';
  csv+=`${y}年度 分队累计得分表\n\n月份,${TEAMS.join(',')}\n`;
  for(let m=1;m<=12;m++){
    const key=k(y,m);const md=_cache[key];
    csv+=`${m}月`;
    TEAMS.forEach((_,ti)=>{
      let s=0;
      if(md)s=calcTeamTotal(ti,md);
      else if(HIST_TOTALS[key])s=HIST_TOTALS[key][ti];
      csv+=`,${s}`;
    });
    csv+=`\n`;
  }

function exportAnnual(){
  const y=+document.getElementById('aYear').value;
  let csv='\uFEFF';
  csv+=`${y}年度 分队考核年度汇总\n\n月份,${TEAMS.join(',')},月度最优\n`;
  for(let m=1;m<=12;m++){
    const key=k(y,m);const md=_cache[key];
    csv+=`${m}月`;let best='',bs=-Infinity;
    TEAMS.forEach((t,ti)=>{
      let s=0;
      if(md)s=calcTeamTotal(ti,md);
      else if(HIST_TOTALS[key])s=HIST_TOTALS[key][ti];
      csv+=`,${s}`;
      if(s>bs){bs=s;best=t;}
    });
    csv+=`,${bs>-Infinity?best:''}\n`;
  }
  downloadCSV(csv,`${y}年度考核汇总.csv`);
  showToast('📤 已导出');
}

function downloadCSV(c,n){
  const b=new Blob([c],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);
}

function showToast(msg){
  const e=document.getElementById('toast');e.textContent=msg;
  e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);
}

// ===== INIT =====
function initYears(){
  const cy=new Date().getFullYear();
  const yrs=[]; for(let y=cy-2;y<=cy+1;y++) yrs.push(y);
  ['sYear','dYear','cYear','aYear'].forEach(id=>{
    const s=document.getElementById(id);
    s.innerHTML=yrs.map(y=>`<option value="${y}"${y===cy?' selected':''}>${y}年</option>`).join('');
  });
  document.getElementById('sMonth').value=new Date().getMonth()+1;
}

// ===== TAB NAV =====
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    const pageId=`page-${tab.dataset.page}`;
    document.getElementById(pageId).classList.add('active');
    if(tab.dataset.page==='cumulative') loadCumul();
    if(tab.dataset.page==='monthly') loadDetail();
  });
});

// ===== BOOT =====
async function bootApp(){
  initYears();
  updateInfo();
  // 尝试恢复上次登录
  const saved = getStoredAuth();
  if(saved){
    authToken = saved;
    document.getElementById('loginOverlay').classList.add('hidden');
  }
  loadCumul();
}

// 自动检查是否有缓存token，有就跳过登录
(function autoLogin(){
  const saved = getStoredAuth();
  if(saved){
    authToken = saved;
    document.getElementById('loginOverlay').classList.add('hidden');
    initYears();
    loadCumul();
  }
})();
